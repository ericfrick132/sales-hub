services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: saleshub
      POSTGRES_PASSWORD: saleshub
      POSTGRES_DB: saleshub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saleshub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      args:
        PROJECT: SalesHub.Api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=saleshub;Username=saleshub;Password=saleshub"
      Jwt__SigningKey: "${JWT_SIGNING_KEY:-CHANGE_ME_TO_A_LONG_RANDOM_STRING_AT_LEAST_32_CHARS}"
      Apify__Token: "${APIFY_TOKEN:-}"
      Evolution__BaseUrl: "${EVOLUTION_BASE_URL:-http://64.227.3.140:8080}"
      Evolution__ApiKey: "${EVOLUTION_API_KEY:-}"
      Google__OAuthClientId: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      Google__PlacesApiKey: "${GOOGLE_PLACES_API_KEY:-}"
      Seed__AdminEmail: "${ADMIN_EMAIL:-}"
      Seed__AdminPassword: "${ADMIN_PASSWORD:-}"
      Cors__Origins: "${CORS_ORIGINS:-http://localhost:5173,http://localhost}"
    ports:
      - "8080:8080"

  workers:
    build:
      context: ./backend
      args:
        PROJECT: SalesHub.Workers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=saleshub;Username=saleshub;Password=saleshub"
      Apify__Token: "${APIFY_TOKEN:-}"
      Evolution__BaseUrl: "${EVOLUTION_BASE_URL:-http://64.227.3.140:8080}"
      Evolution__ApiKey: "${EVOLUTION_API_KEY:-}"
      Google__PlacesApiKey: "${GOOGLE_PLACES_API_KEY:-}"
      TZ: "America/Argentina/Buenos_Aires"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
